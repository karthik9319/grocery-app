<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1b7a4d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pantry Pilot" />
    <title>Pantry Pilot</title>
    <style>
      /* Shown immediately (before the JS bundle finishes downloading/parsing) so a
         slow/flaky mobile connection shows visible progress instead of a blank white
         screen that can look "stuck". React replaces this the moment it mounts. */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #fff7ec;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #4b4636;
      }
      #initial-loader .spin {
        width: 32px;
        height: 32px;
        border: 3px solid #1b7a4d33;
        border-top-color: #1b7a4d;
        border-radius: 50%;
        animation: initial-loader-spin 0.8s linear infinite;
      }
      @keyframes initial-loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spin"></div>
        <p>Loading Pantry Pilot…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
